<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>首页 - 校园社交</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .home-header {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            padding: 1.5rem;
        }
        
        .home-header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }
        
        .home-welcome {
            font-size: 1.125rem;
            font-weight: 600;
        }
        
        .home-notification {
            width: 2.5rem;
            height: 2.5rem;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
        }
        
        .home-notification-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 1rem;
            height: 1rem;
            background: var(--danger-color);
            border-radius: 50%;
            font-size: 0.625rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .current-mode-card {
            background: rgba(255,255,255,0.15);
            border-radius: var(--radius-lg);
            padding: 1rem;
            backdrop-filter: blur(10px);
        }
        
        .current-mode-label {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-bottom: 0.25rem;
        }
        
        .current-mode-value {
            font-size: 1.125rem;
            font-weight: 600;
        }
        
        .home-content {
            padding: 1rem;
        }
        
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }
        
        .section-title {
            font-weight: 600;
            font-size: 1rem;
        }
        
        .section-more {
            font-size: 0.875rem;
            color: var(--primary-color);
            cursor: pointer;
        }
        
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        
        .quick-action {
            text-align: center;
            cursor: pointer;
        }
        
        .quick-action-icon {
            width: 3rem;
            height: 3rem;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.5rem;
            font-size: 1.25rem;
        }
        
        .quick-action-icon.study { background: rgba(34, 197, 94, 0.1); }
        .quick-action-icon.kaoyan { background: rgba(99, 102, 241, 0.1); }
        .quick-action-icon.friend { background: rgba(245, 158, 11, 0.1); }
        .quick-action-icon.love { background: rgba(236, 72, 153, 0.1); }
        
        .quick-action-text {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        .match-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            color: white;
            margin-bottom: 1rem;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .match-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
        }
        
        .match-card-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .match-card-desc {
            font-size: 0.875rem;
            opacity: 0.9;
            margin-bottom: 1rem;
        }
        
        .match-card-btn {
            display: inline-block;
            padding: 0.5rem 1.25rem;
            background: white;
            color: #667eea;
            border-radius: var(--radius-xl);
            font-weight: 500;
            font-size: 0.875rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        
        .stat-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 1rem;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }
        
        .activity-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 1rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: var(--shadow-sm);
        }
        
        .activity-icon {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.125rem;
            background: var(--bg-secondary);
        }
        
        .activity-content {
            flex: 1;
        }
        
        .activity-title {
            font-weight: 500;
            font-size: 0.9375rem;
        }
        
        .activity-time {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 0.125rem;
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <div class="home-header">
            <div class="home-header-top">
                <div class="home-welcome">你好，<span id="user-name">同学</span> 👋</div>
                <div class="home-notification" onclick="goToInvites()">
                    <span>🔔</span>
                    <span class="home-notification-badge" id="invite-badge" style="display: none;">0</span>
                </div>
            </div>
            <div class="current-mode-card" onclick="changePurpose()">
                <div class="current-mode-label">当前交友目的</div>
                <div class="current-mode-value" id="current-purpose">请选择交友目的 ›</div>
            </div>
        </div>
        
        <div class="home-content">
            <!-- 快捷入口 -->
            <div class="quick-actions">
                <div class="quick-action" onclick="quickMatch('study')">
                    <div class="quick-action-icon study">📚</div>
                    <div class="quick-action-text">学习搭子</div>
                </div>
                <div class="quick-action" onclick="quickMatch('kaoyan')">
                    <div class="quick-action-icon kaoyan">🎯</div>
                    <div class="quick-action-text">考研搭子</div>
                </div>
                <div class="quick-action" onclick="quickMatch('friend')">
                    <div class="quick-action-icon friend">🤝</div>
                    <div class="quick-action-text">兴趣交友</div>
                </div>
                <div class="quick-action" onclick="quickMatch('love')">
                    <div class="quick-action-icon love">💕</div>
                    <div class="quick-action-text">异性恋爱</div>
                </div>
            </div>
            
            <!-- 开始匹配卡片 -->
            <div class="match-card" onclick="startMatch()">
                <div class="match-card-title">🚀 开始智能匹配</div>
                <div class="match-card-desc">基于你的资料和偏好，为你推荐最合适的伙伴</div>
                <div class="match-card-btn">立即匹配</div>
            </div>
            
            <!-- 统计数据 -->
            <div class="section-header">
                <div class="section-title">我的数据</div>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="stat-matches">0</div>
                    <div class="stat-label">匹配成功</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-friends">0</div>
                    <div class="stat-label">我的好友</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-chats">0</div>
                    <div class="stat-label">今日聊天</div>
                </div>
            </div>
            
            <!-- 最近动态 -->
            <div class="section-header">
                <div class="section-title">最近动态</div>
                <div class="section-more" onclick="viewAllActivities()">查看全部</div>
            </div>
            <div id="activity-list">
                <div class="empty-state">
                    <div class="empty-icon">📭</div>
                    <div class="empty-text">暂无动态</div>
                </div>
            </div>
        </div>
        
        <!-- 底部导航 -->
        <nav class="bottom-nav">
            <a href="home.html" class="nav-item active">
                <span>🏠</span>
                <span>首页</span>
            </a>
            <a href="match.html" class="nav-item">
                <span>🔍</span>
                <span>匹配</span>
            </a>
            <a href="messages.html" class="nav-item">
                <span>💬</span>
                <span>消息</span>
            </a>
            <a href="profile.html" class="nav-item">
                <span>👤</span>
                <span>我的</span>
            </a>
        </nav>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        // 检查登录状态
        checkLogin();
        
        const purposeNames = {
            'study': '📚 学习搭子',
            'kaoyan': '🎯 考研搭子',
            'friend': '🤝 同性交友',
            'love': '💕 异性恋爱'
        };
        
        // 初始化页面
        function init() {
            const userInfo = JSON.parse(localStorage.getItem('userInfo') || '{}');
            if (userInfo.name) {
                document.getElementById('user-name').textContent = userInfo.name;
            }
            
            const currentPurpose = localStorage.getItem('currentPurpose');
            if (currentPurpose && purposeNames[currentPurpose]) {
                document.getElementById('current-purpose').textContent = purposeNames[currentPurpose] + ' ›';
            }
            
            loadStats();
            loadActivities();
            checkInvites();
        }
        
        // 加载统计数据
        async function loadStats() {
            try {
                const res = await api.getStats();
                if (res.success) {
                    document.getElementById('stat-matches').textContent = res.data.matches || 0;
                    document.getElementById('stat-friends').textContent = res.data.friends || 0;
                    document.getElementById('stat-chats').textContent = res.data.chats || 0;
                }
            } catch (e) {
                console.log('加载统计失败');
            }
        }
        
        // 加载动态
        async function loadActivities() {
            try {
                const res = await api.getActivities();
                if (res.success && res.data.length > 0) {
                    const html = res.data.slice(0, 3).map(item => `
                        <div class="activity-card">
                            <div class="activity-icon">${item.icon}</div>
                            <div class="activity-content">
                                <div class="activity-title">${item.title}</div>
                                <div class="activity-time">${item.time}</div>
                            </div>
                        </div>
                    `).join('');
                    document.getElementById('activity-list').innerHTML = html;
                }
            } catch (e) {
                console.log('加载动态失败');
            }
        }
        
        // 检查邀请
        async function checkInvites() {
            try {
                const res = await api.getPendingInvites();
                if (res.success && res.data.length > 0) {
                    const badge = document.getElementById('invite-badge');
                    badge.textContent = res.data.length;
                    badge.style.display = 'flex';
                }
            } catch (e) {
                console.log('检查邀请失败');
            }
        }
        
        function changePurpose() {
            window.location.href = 'purpose.html';
        }
        
        function quickMatch(type) {
            localStorage.setItem('currentPurpose', type);
            window.location.href = 'match.html?type=' + type;
        }
        
        function startMatch() {
            const currentPurpose = localStorage.getItem('currentPurpose');
            if (!currentPurpose) {
                showToast('请先选择交友目的');
                setTimeout(() => {
                    window.location.href = 'purpose.html';
                }, 1000);
                return;
            }
            window.location.href = 'match.html?type=' + currentPurpose;
        }
        
        function goToInvites() {
            window.location.href = 'invites.html';
        }
        
        function viewAllActivities() {
            showToast('功能开发中');
        }
        
        init();
    </script>
</body>
</html>
