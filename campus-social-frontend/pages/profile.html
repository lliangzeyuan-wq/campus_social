<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>个人中心 - 校园社交</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .profile-content {
            padding-bottom: 5rem;
        }
        
        .profile-header {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            padding: 2rem 1.5rem;
            text-align: center;
        }
        
        .profile-avatar-wrapper {
            position: relative;
            display: inline-block;
        }
        
        .profile-avatar {
            width: 5rem;
            height: 5rem;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--primary-color);
            border: 3px solid rgba(255,255,255,0.3);
        }
        
        .profile-avatar-edit {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 1.5rem;
            height: 1.5rem;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }
        
        .profile-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin-top: 1rem;
        }
        
        .profile-id {
            font-size: 0.875rem;
            opacity: 0.8;
            margin-top: 0.25rem;
        }
        
        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.5rem;
        }
        
        .profile-stat {
            text-align: center;
        }
        
        .profile-stat-value {
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .profile-stat-label {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-top: 0.125rem;
        }
        
        .profile-section {
            padding: 1rem;
        }
        
        .profile-section-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            padding-left: 0.5rem;
        }
        
        .menu-list {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: var(--transition);
        }
        
        .menu-item:last-child {
            border-bottom: none;
        }
        
        .menu-item:active {
            background: var(--bg-secondary);
        }
        
        .menu-icon {
            width: 2.25rem;
            height: 2.25rem;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 0.875rem;
            font-size: 1.125rem;
        }
        
        .menu-icon.blue { background: rgba(99, 102, 241, 0.1); }
        .menu-icon.green { background: rgba(34, 197, 94, 0.1); }
        .menu-icon.orange { background: rgba(245, 158, 11, 0.1); }
        .menu-icon.red { background: rgba(239, 68, 68, 0.1); }
        .menu-icon.purple { background: rgba(168, 85, 247, 0.1); }
        .menu-icon.cyan { background: rgba(6, 182, 212, 0.1); }
        
        .menu-text {
            flex: 1;
            font-size: 0.9375rem;
            color: var(--text-primary);
        }
        
        .menu-arrow {
            color: var(--text-light);
            font-size: 1.25rem;
        }
        
        .menu-badge {
            background: var(--danger-color);
            color: white;
            font-size: 0.6875rem;
            padding: 0.125rem 0.375rem;
            border-radius: var(--radius-xl);
            margin-right: 0.5rem;
        }
        
        .logout-btn {
            margin-top: 1.5rem;
            width: 100%;
        }
        
        .version-info {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.75rem;
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <div class="profile-content">
            <div class="profile-header">
                <div class="profile-avatar-wrapper">
                    <div class="profile-avatar" id="profile-avatar">?</div>
                    <div class="profile-avatar-edit" onclick="editAvatar()">✏️</div>
                </div>
                <div class="profile-name" id="profile-name">加载中...</div>
                <div class="profile-id" id="profile-id">学号: --</div>
                
                <div class="profile-stats">
                    <div class="profile-stat">
                        <div class="profile-stat-value" id="stat-friends">0</div>
                        <div class="profile-stat-label">好友</div>
                    </div>
                    <div class="profile-stat">
                        <div class="profile-stat-value" id="stat-matches">0</div>
                        <div class="profile-stat-label">匹配</div>
                    </div>
                    <div class="profile-stat">
                        <div class="profile-stat-value" id="stat-days">1</div>
                        <div class="profile-stat-label">活跃天数</div>
                    </div>
                </div>
            </div>
            
            <div class="profile-section">
                <div class="profile-section-title">功能菜单</div>
                <div class="menu-list">
                    <div class="menu-item" onclick="editProfile()">
                        <div class="menu-icon blue">✏️</div>
                        <div class="menu-text">编辑资料</div>
                        <div class="menu-arrow">›</div>
                    </div>
                    <div class="menu-item" onclick="myFriends()">
                        <div class="menu-icon green">👥</div>
                        <div class="menu-text">我的好友</div>
                        <div class="menu-arrow">›</div>
                    </div>
                    <div class="menu-item" onclick="myInvites()">
                        <div class="menu-icon orange">📨</div>
                        <div class="menu-text">交友邀请</div>
                        <span class="menu-badge" id="invite-menu-badge" style="display: none;">0</span>
                        <div class="menu-arrow">›</div>
                    </div>
                    <div class="menu-item" onclick="matchHistory()">
                        <div class="menu-icon purple">📋</div>
                        <div class="menu-text">匹配记录</div>
                        <div class="menu-arrow">›</div>
                    </div>
                </div>
            </div>
            
            <div class="profile-section">
                <div class="profile-section-title">设置</div>
                <div class="menu-list">
                    <div class="menu-item" onclick="changePurpose()">
                        <div class="menu-icon cyan">🎯</div>
                        <div class="menu-text">切换交友目的</div>
                        <div class="menu-arrow">›</div>
                    </div>
                    <div class="menu-item" onclick="privacySettings()">
                        <div class="menu-icon blue">🔒</div>
                        <div class="menu-text">隐私设置</div>
                        <div class="menu-arrow">›</div>
                    </div>
                    <div class="menu-item" onclick="aboutUs()">
                        <div class="menu-icon green">ℹ️</div>
                        <div class="menu-text">关于我们</div>
                        <div class="menu-arrow">›</div>
                    </div>
                </div>
            </div>
            
            <div class="profile-section">
                <button class="btn btn-secondary logout-btn" onclick="logout()">退出登录</button>
                <div class="version-info">校园社交匹配系统 v1.0.0</div>
            </div>
        </div>
        
        <!-- 底部导航 -->
        <nav class="bottom-nav">
            <a href="home.html" class="nav-item">
                <span>🏠</span>
                <span>首页</span>
            </a>
            <a href="match.html" class="nav-item">
                <span>🔍</span>
                <span>匹配</span>
            </a>
            <a href="messages.html" class="nav-item">
                <span>💬</span>
                <span>消息</span>
            </a>
            <a href="profile.html" class="nav-item active">
                <span>👤</span>
                <span>我的</span>
            </a>
        </nav>
    </div>
    
    <!-- 退出确认模态框 -->
    <div class="modal-overlay" id="logout-modal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">退出登录</div>
            </div>
            <div class="modal-body">确定要退出登录吗？</div>
            <div class="modal-footer">
                <button class="modal-btn cancel" onclick="closeLogoutModal()">取消</button>
                <button class="modal-btn danger" onclick="confirmLogout()">退出</button>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        checkLogin();
        
        function init() {
            loadUserInfo();
            loadStats();
            checkInvites();
        }
        
        function loadUserInfo() {
            const userInfo = JSON.parse(localStorage.getItem('userInfo') || '{}');
            
            if (userInfo.name) {
                document.getElementById('profile-name').textContent = userInfo.name;
                document.getElementById('profile-avatar').textContent = userInfo.name[0] || '?';
            }
            
            if (userInfo.studentId) {
                document.getElementById('profile-id').textContent = '学号: ' + userInfo.studentId;
            }
        }
        
        async function loadStats() {
            try {
                const res = await api.getStats();
                if (res.success) {
                    document.getElementById('stat-friends').textContent = res.data.friends || 0;
                    document.getElementById('stat-matches').textContent = res.data.matches || 0;
                    if (res.data.activeDays) {
                        document.getElementById('stat-days').textContent = res.data.activeDays;
                    }
                }
            } catch (e) {
                console.log('加载统计失败');
            }
        }
        
        async function checkInvites() {
            try {
                const res = await api.getPendingInvites();
                if (res.success && res.data.length > 0) {
                    const badge = document.getElementById('invite-menu-badge');
                    badge.textContent = res.data.length;
                    badge.style.display = 'inline-block';
                }
            } catch (e) {
                console.log('检查邀请失败');
            }
        }
        
        function editAvatar() {
            showToast('头像上传功能开发中');
        }
        
        function editProfile() {
            const purpose = localStorage.getItem('currentPurpose') || 'study';
            window.location.href = 'profile-edit.html?purpose=' + purpose;
        }
        
        function myFriends() {
            showToast('功能开发中');
        }
        
        function myInvites() {
            window.location.href = 'invites.html';
        }
        
        function matchHistory() {
            showToast('功能开发中');
        }
        
        function changePurpose() {
            window.location.href = 'purpose.html';
        }
        
        function privacySettings() {
            showToast('功能开发中');
        }
        
        function aboutUs() {
            showToast('校园社交匹配系统 v1.0.0\n专为在校学生打造的社交平台');
        }
        
        function logout() {
            document.getElementById('logout-modal').classList.add('show');
        }
        
        function closeLogoutModal() {
            document.getElementById('logout-modal').classList.remove('show');
        }
        
        function confirmLogout() {
            localStorage.removeItem('userInfo');
            localStorage.removeItem('currentPurpose');
            window.location.href = '../index.html';
        }
        
        init();
    </script>
</body>
</html>
